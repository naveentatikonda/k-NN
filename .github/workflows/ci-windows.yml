name: CI Windows
on:
  workflow_call:
    inputs:
      test_scope:
        description: 'Test scope: all, unit, integration'
        required: false
        default: 'all'
        type: string
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope: all, unit, integration'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration

jobs:
  build-and-unit-test:
    if: inputs.test_scope == 'all' || inputs.test_scope == 'unit'
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]

    name: Build and Unit Test k-NN on Windows (Java ${{ matrix.java }})
    runs-on: windows-latest

    steps:
      - name: Checkout k-NN
        uses: actions/checkout@v4

      - name: Setup git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install MinGW Using Chocolatey
        run: choco install mingw -y --no-progress

      - name: Add MinGW to PATH
        run: |
          echo "C:/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin" >> $env:GITHUB_PATH
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

      - name: Install Zlib
        run: |
          curl -L -o zlib.7z https://raw.githubusercontent.com/ScoopInstaller/Binary/master/zlib/zlib-1.2.12-windows-32bit-vc14.2.7z
          7z x zlib.7z -oC:\zlib
          echo "CMAKE_PREFIX_PATH=C:\zlib" >> $env:GITHUB_ENV

      - name: Download OpenBLAS
        run: |
          curl -L -O https://github.com/xianyi/OpenBLAS/releases/download/v0.3.21/OpenBLAS-0.3.21-x64.zip
          mkdir OpenBLAS
          Expand-Archive -Path .\OpenBLAS-0.3.21-x64.zip -DestinationPath .\OpenBLAS\
          mkdir ./src/main/resources/windowsDependencies
          cp ./OpenBLAS/bin/libopenblas.dll ./src/main/resources/windowsDependencies/
          rm .\OpenBLAS-0.3.21-x64.zip
          rm -r .\OpenBLAS\

      - name: Detect CPU core count
        id: cores
        shell: pwsh
        run: |
          $cores = (Get-CimInstance Win32_Processor).NumberOfCores
          echo "count=$cores" >> $env:GITHUB_OUTPUT
          echo "Detected $cores physical cores"

      - name: Build and run unit tests
        run: ./gradlew.bat assemble buildJniLib test -D'avx2.enabled=false' -D'avx512.enabled=false' -D"nproc.count=${{ steps.cores.outputs.count }}" --parallel

  integration-test:
    if: inputs.test_scope == 'all' || inputs.test_scope == 'integration'
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]

    name: Integration Test k-NN on Windows (Java ${{ matrix.java }})
    runs-on: windows-latest

    steps:
      - name: Checkout k-NN
        uses: actions/checkout@v4

      - name: Setup git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install MinGW Using Chocolatey
        run: choco install mingw -y --no-progress

      - name: Add MinGW to PATH
        run: |
          echo "C:/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin" >> $env:GITHUB_PATH
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

      - name: Install Zlib
        run: |
          curl -L -o zlib.7z https://raw.githubusercontent.com/ScoopInstaller/Binary/master/zlib/zlib-1.2.12-windows-32bit-vc14.2.7z
          7z x zlib.7z -oC:\zlib
          echo "CMAKE_PREFIX_PATH=C:\zlib" >> $env:GITHUB_ENV

      - name: Download OpenBLAS
        run: |
          curl -L -O https://github.com/xianyi/OpenBLAS/releases/download/v0.3.21/OpenBLAS-0.3.21-x64.zip
          mkdir OpenBLAS
          Expand-Archive -Path .\OpenBLAS-0.3.21-x64.zip -DestinationPath .\OpenBLAS\
          mkdir ./src/main/resources/windowsDependencies
          cp ./OpenBLAS/bin/libopenblas.dll ./src/main/resources/windowsDependencies/
          rm .\OpenBLAS-0.3.21-x64.zip
          rm -r .\OpenBLAS\

      - name: Detect CPU core count
        id: cores
        shell: pwsh
        run: |
          $cores = (Get-CimInstance Win32_Processor).NumberOfCores
          echo "count=$cores" >> $env:GITHUB_OUTPUT
          echo "Detected $cores physical cores"

      - name: Run integration tests
        run: ./gradlew.bat integTest integTestMultiNode -D'avx2.enabled=false' -D'avx512.enabled=false' -D"nproc.count=${{ steps.cores.outputs.count }}" --parallel
