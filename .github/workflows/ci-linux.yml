name: CI Linux
on:
  workflow_call:
    inputs:
      test_scope:
        description: 'Test scope: all, unit, integration'
        required: false
        default: 'all'
        type: string
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope: all, unit, integration'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration

jobs:
  Get-CI-Image-Tag:
    uses: opensearch-project/opensearch-build/.github/workflows/get-ci-image-tag.yml@main
    with:
      product: opensearch

  build-and-unit-test:
    if: inputs.test_scope == 'all' || inputs.test_scope == 'unit'
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]

    env:
      CC: gcc10-gcc
      CXX: gcc10-g++
      FC: gcc10-gfortran

    name: Build and Unit Test k-NN on Linux (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: Get-CI-Image-Tag
    container:
      image: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-version-linux }}
      options: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-options }}

    steps:
      - name: Run start commands
        run: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-command }}

      - name: Checkout k-NN
        uses: actions/checkout@v4

      - name: Setup git user
        run: |
          su `id -un 1000` -c 'git config --global user.name "github-actions[bot]"'
          su `id -un 1000` -c 'git config --global user.email "github-actions[bot]@users.noreply.github.com"'

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Set GRADLE_USER_HOME and fix permissions
        run: |
          mkdir -p /home/ci/.gradle
          chown -R 1000:1000 /home/ci/.gradle
          chown -R 1000:1000 `pwd`
          echo "GRADLE_USER_HOME=/home/ci/.gradle" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Determine SIMD flags
        id: simd
        run: |
          if lscpu | grep -i avx512f | grep -i avx512cd | grep -i avx512vl | grep -i avx512dq | grep -i avx512bw; then
            if lscpu | grep -q "GenuineIntel" && lscpu | grep -i avx512_fp16 | grep -i avx512_bf16 | grep -i avx512_vpopcntdq; then
              echo "flags=-Davx512_spr.enabled=true" >> $GITHUB_OUTPUT
            else
              echo "flags=-Davx512_spr.enabled=false" >> $GITHUB_OUTPUT
            fi
          elif lscpu | grep -i avx2; then
            echo "flags=-Davx512.enabled=false -Davx512_spr.enabled=false" >> $GITHUB_OUTPUT
          else
            echo "flags=-Davx2.enabled=false -Davx512.enabled=false -Davx512_spr.enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect CPU core count
        id: cores
        run: |
          CORES=$(nproc)
          echo "count=$CORES" >> $GITHUB_OUTPUT
          echo "Detected $CORES cores"

      - name: Build and run unit tests
        run: |
          su `id -un 1000` -c "java -version && ./gradlew assemble buildJniLib test ${{ steps.simd.outputs.flags }} -Dnproc.count=${{ steps.cores.outputs.count }} --parallel"

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          use_pypi: true

  integration-test:
    if: inputs.test_scope == 'all' || inputs.test_scope == 'integration'
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]

    env:
      CC: gcc10-gcc
      CXX: gcc10-g++
      FC: gcc10-gfortran

    name: Integration Test k-NN on Linux (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: Get-CI-Image-Tag
    container:
      image: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-version-linux }}
      options: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-options }}

    steps:
      - name: Run start commands
        run: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-command }}

      - name: Checkout k-NN
        uses: actions/checkout@v4

      - name: Setup git user
        run: |
          su `id -un 1000` -c 'git config --global user.name "github-actions[bot]"'
          su `id -un 1000` -c 'git config --global user.email "github-actions[bot]@users.noreply.github.com"'

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Set GRADLE_USER_HOME and fix permissions
        run: |
          mkdir -p /home/ci/.gradle
          chown -R 1000:1000 /home/ci/.gradle
          chown -R 1000:1000 `pwd`
          echo "GRADLE_USER_HOME=/home/ci/.gradle" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Determine SIMD flags
        id: simd
        run: |
          if lscpu | grep -i avx512f | grep -i avx512cd | grep -i avx512vl | grep -i avx512dq | grep -i avx512bw; then
            if lscpu | grep -q "GenuineIntel" && lscpu | grep -i avx512_fp16 | grep -i avx512_bf16 | grep -i avx512_vpopcntdq; then
              echo "flags=-Davx512_spr.enabled=true" >> $GITHUB_OUTPUT
            else
              echo "flags=-Davx512_spr.enabled=false" >> $GITHUB_OUTPUT
            fi
          elif lscpu | grep -i avx2; then
            echo "flags=-Davx512.enabled=false -Davx512_spr.enabled=false" >> $GITHUB_OUTPUT
          else
            echo "flags=-Davx2.enabled=false -Davx512.enabled=false -Davx512_spr.enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect CPU core count
        id: cores
        run: |
          CORES=$(nproc)
          echo "count=$CORES" >> $GITHUB_OUTPUT
          echo "Detected $CORES cores"

      - name: Run integration tests
        run: |
          su `id -un 1000` -c "java -version && ./gradlew integTest integTestMultiNode ${{ steps.simd.outputs.flags }} -Dnproc.count=${{ steps.cores.outputs.count }} --parallel"
