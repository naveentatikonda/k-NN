name: Build and Test k-NN
on:
  schedule:
    - cron: '0 0 * * *'  # every night
  push:
    branches:
      - "*"
      - "feature/**"
  pull_request:
    branches:
      - "*"
      - "feature/**"
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to run: all, linux, macos, windows'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - macos
          - windows
      test_scope:
        description: 'Test scope: all, unit, integration'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration

jobs:
  check-files:
    name: Check file for Build and Test k-NN
    runs-on: ubuntu-latest
    outputs:
      RUN_BUILD_AND_TEST: ${{ steps.check.outputs.files_changed }}
    steps:
      - uses: actions/checkout@v6
      - name: Check files
        id: check
        uses: ./.github/actions/check-files
        with:
          files: .github/workflows/CI.yml,.github/workflows/ci-linux.yml,.github/workflows/ci-macos.yml,.github/workflows/ci-windows.yml

  ci-linux:
    needs: check-files
    if: |
      needs.check-files.outputs.RUN_BUILD_AND_TEST == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux')
    uses: ./.github/workflows/ci-linux.yml
    with:
      test_scope: ${{ github.event.inputs.test_scope || 'all' }}
    secrets: inherit

  ci-macos:
    needs: check-files
    if: |
      needs.check-files.outputs.RUN_BUILD_AND_TEST == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')
    uses: ./.github/workflows/ci-macos.yml
    with:
      test_scope: ${{ github.event.inputs.test_scope || 'all' }}
    secrets: inherit

  ci-windows:
    needs: check-files
    if: |
      needs.check-files.outputs.RUN_BUILD_AND_TEST == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows')
    uses: ./.github/workflows/ci-windows.yml
    with:
      test_scope: ${{ github.event.inputs.test_scope || 'all' }}
    secrets: inherit

  check-results:
    needs: [check-files, ci-linux, ci-macos, ci-windows]
    if: always()
    name: Check results Build and Test k-NN
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.ci-linux.result }}"
            "${{ needs.ci-macos.result }}"
            "${{ needs.ci-windows.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" ]]; then
              echo "One or more platform CIs failed"
              exit 1
            fi
          done
          echo "All platforms passed or were skipped"
